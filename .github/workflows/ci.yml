name: "CI Pipeline"

# main 브랜치로 코드가 Push되거나 Pull Request가 열릴 때 실행
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      # 1. 저장소 코드 가져오기
      - name: "Checkout Code"
        uses: "actions/checkout@v4"

      # 2. 파이썬 3.11 환경 설정
      - name: "Set up Python 3.11"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.11"

      # 3. 가상환경 세팅 및 의존성 패키지(pytest, pytest-cov 등) 설치
      # --no-cache-dir과 유사하게 가상환경 내부 pip 캐시를 정리하여 효율화합니다.
      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov httpx fastapi

      # 4. PYTHONPATH를 지정하여 pytest 및 커버리지 검사 실행 (핵심 Step)
      # --cov-fail-under=80 옵션 덕분에 80% 미만이면 이 step에서 자동 에러(Exit Code 1)를 던집니다.
      - name: "Run Tests with Coverage Check"
        env:
          PYTHONPATH: "src"
        run: |
          pytest tests/ -v --cov=settlement --cov-report=term-missing --cov-fail-under=80
