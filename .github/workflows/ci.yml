name: "CI Pipeline"

# main 브랜치로 코드가 Push되거나 Pull Request가 열릴 때 실행
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-security:
    runs-on: ["self-hosted", "linux", "X64"]

    steps:
      # 1. 저장소 코드 가져오기
      - name: "Checkout Code"
        uses: "actions/checkout@v4"

      # 2. 파이썬 3.11 환경 설정 (필요 시 유지, 서버 로컬 파이썬 사용 시 생략 가능)
      - name: "Set up Python 3.11"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.11"

      # 3. 가상환경 세팅 및 의존성 패키지 설치
      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov httpx fastapi

      # 4. PYTHONPATH를 지정하여 pytest 및 커버리지 검사 실행
      - name: "Run Tests with Coverage Check"
        env:
          PYTHONPATH: "src"
        run: |
          pytest tests/ -v --cov=settlement --cov-report=term-missing --cov-fail-under=80

      # 5. [추가] Docker 이미지 빌드
      # 로컬에 'myapp:latest'라는 이름으로 이미지를 빌드합니다. (태그는 상황에 맞게 변경 가능)
      - name: "Build Docker Image"
        run: |
          docker build -t settlement:latest .

      # 6. [추가] Trivy 취약점 점검 수행
      # --severity CRITICAL: 최고 위험 등급인 Critical만 필터링합니다.
      # --ignore-unfixed: 공식 패치(Fix)가 나오지 않은 취약점은 무시하고 통과시킵니다.
      # exit-code 1: 조건에 맞는 Critical 취약점이 발견되면 파이썬 스크립트처럼 에러(빌드 실패)를 던집니다.
      - name: "Run Trivy Vulnerability Scanner"
        uses: "aquasecurity/trivy-action@master"
        with:
          image-ref: "settlement:latest"
          format: "table"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
